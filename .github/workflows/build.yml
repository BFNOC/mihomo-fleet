name: build

on:
  push:
    paths:
      - VERSION

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: 检出代码
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 安装 Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 安装 Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: 启用 pnpm
        run: corepack enable

      - name: 安装前端依赖
        run: pnpm install --frozen-lockfile

      - name: 测试前端逻辑
        run: pnpm test:web

      - name: 校验前端构建产物
        run: pnpm verify:web

      - name: 读取版本
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$version" ]; then
            echo "VERSION 文件为空" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: 测试
        run: go test ./...

      - name: 静态检查
        run: go vet ./...

      - name: 编译
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
          CGO_ENABLED: "0"
        run: |
          binary="mihomo-fleet-${GOOS}-${GOARCH}${EXT}"
          commit="${GITHUB_SHA::7}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${commit} -X main.buildDate=${build_date}" \
            -o "dist/${binary}" \
            ./cmd/mihomo-fleet

      - name: 上传产物
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mihomo-fleet-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/mihomo-fleet-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: 发布 Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 检出代码
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: 读取版本
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$version" ]; then
            echo "VERSION 文件为空" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: 下载编译产物
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist/release
          merge-multiple: true

      - name: 创建或更新 Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/release/* --clobber
          else
            gh release create "$TAG" dist/release/* \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes "mihomo-fleet $VERSION"
          fi
