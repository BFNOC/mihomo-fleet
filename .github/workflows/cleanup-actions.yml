name: 清理旧 Actions 数据

on:
  schedule:
    - cron: "17 3 * * 0"
  workflow_dispatch:

permissions:
  actions: write

concurrency:
  group: cleanup-actions-history
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 清理过期产物与已完成运行
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          artifact_cutoff="$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%SZ)"
          run_cutoff="$(date -u -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)"

          # 先取完全部分页结果再删除，避免删除过程改变 offset 导致漏项。
          gh api --paginate --slurp \
            "/repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" > artifacts.json
          jq -r --arg cutoff "$artifact_cutoff" \
            '.[].artifacts[] | select((.expired // false) == false and .created_at < $cutoff) | .id' artifacts.json > artifact-ids.txt
          while read -r id; do
            if [ -n "$id" ]; then
              gh api --method DELETE "/repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}" \
                || echo "跳过删除失败的 artifact：${id}" >&2
            fi
          done < artifact-ids.txt

          gh api --paginate --slurp \
            "/repos/${GITHUB_REPOSITORY}/actions/runs?status=completed&per_page=100" > runs.json
          jq -r --arg cutoff "$run_cutoff" \
            '.[].workflow_runs[] | select(.created_at < $cutoff) | .id' runs.json > run-ids.txt
          while read -r id; do
            if [ -n "$id" ]; then
              gh api --method DELETE "/repos/${GITHUB_REPOSITORY}/actions/runs/${id}" \
                || echo "跳过删除失败的 workflow run：${id}" >&2
            fi
          done < run-ids.txt
